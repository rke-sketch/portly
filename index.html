<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portly — AI 연결판</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif; background:#f9fafb; color:#191f28; height:100vh; overflow:hidden; }
  button { font-family:inherit; cursor:pointer; border:none; }
  #header { height:60px; background:#fff; border-bottom:1px solid #f2f4f6; display:flex; align-items:center; padding:0 20px; gap:12px; }
  .logo { font-size:21px; font-weight:700; letter-spacing:-0.5px; }
  .phase-label { font-size:13px; color:#8b95a1; }
  .proj-chip { font-size:12px; font-weight:600; color:#3182f6; background:#e8f3ff; padding:5px 10px; border-radius:20px; display:none; }
  .build-main { display:flex; flex:1; min-height:0; }
  .build-footer { padding:12px 20px; background:#fff; border-top:1px solid #f2f4f6; }
  .build-footer button { width:100%; padding:15px; border-radius:12px; background:#3182f6; color:#fff; font-size:15px; font-weight:600; }
  .build-footer button:hover { background:#1b64da; }
  .stale { opacity:.55; pointer-events:none; }
  .screen { display:none; height:calc(100vh - 60px); }
  .screen.on { display:flex; }
  #build.on { flex-direction:column; }
  .center-wrap { width:100%; align-items:center; justify-content:center; }
  .center-card { max-width:500px; text-align:center; padding:40px; }
  .center-card h1 { font-size:34px; font-weight:700; letter-spacing:-1px; margin-bottom:12px; }
  .center-card .sub { font-size:15px; color:#6b7684; margin-bottom:36px; line-height:1.7; }
  .center-card .q { font-size:19px; font-weight:600; margin-bottom:18px; }
  .btn-row { display:flex; gap:10px; justify-content:center; }
  .btn-big { padding:16px 24px; border-radius:12px; font-size:15px; font-weight:600; }
  .btn-pri { background:#3182f6; color:#fff; } .btn-pri:hover{ background:#1b64da; }
  .btn-sec { background:#f2f4f6; color:#333d4b; } .btn-sec:hover{ background:#e5e8eb; }
  .btn-row .btn-sec { flex:1; }
  .hint { font-size:13px; color:#8b95a1; line-height:1.7; }

  #intro { background: radial-gradient(130% 115% at 0% 0%, #dbe9ff 0%, #eef3fb 42%, #f9fafb 72%); }
  #intro .btn-sec { background:#e2e6ea; border:1px solid #d6dbe0; } #intro .btn-sec:hover{ background:#d1d6db; }
  .value-box { font-size:13.5px; color:#4e5968; background:rgba(255,255,255,.72); border:1px solid #e9edf3; border-radius:16px; padding:18px 20px; line-height:1.6; margin-bottom:28px; text-align:left; }
  .value-box .step { display:flex; gap:10px; align-items:flex-start; }
  .value-box .step + .step { margin-top:12px; }
  .value-box .num { flex-shrink:0; width:20px; height:20px; border-radius:50%; background:#3182f6; color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px; }
  .value-box .step b { color:#191f28; font-weight:600; }
  .chat-col { display:flex; flex-direction:column; height:100%; }
  #consult .chat-col { width:100%; max-width:760px; margin:0 auto; }
  #build .chat-col { width:44%; border-right:1px solid #f2f4f6; background:#fff; }
  .msgs { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .bubble { max-width:78%; padding:13px 16px; border-radius:18px; font-size:14.5px; line-height:1.65; white-space:pre-wrap; word-break:break-word; }
  .ai { background:#f2f4f6; color:#191f28; align-self:flex-start; border-bottom-left-radius:4px; }
  .me { background:#191f28; color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .typing { color:#8b95a1; letter-spacing:2px; animation:pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity:.4; } }
  .sysnote { align-self:center; font-size:12px; color:#c0392b; background:#fdecea; border:1px solid #f5c6cb; padding:8px 12px; border-radius:14px; max-width:90%; text-align:center; }
  .cards { display:flex; flex-direction:column; gap:8px; align-self:stretch; }
  .card { text-align:left; background:#fff; border:1.5px solid #e5e8eb; border-radius:14px; padding:14px 16px; transition:.15s; }
  .card:hover { border-color:#90c2ff; }
  .card.selected { border-color:#3182f6; background:#f7faff; box-shadow:0 0 0 1px #3182f6 inset; }
  .card b { font-size:14.5px; display:block; margin-bottom:4px; }
  .card span { font-size:13px; color:#6b7684; line-height:1.5; display:block; }
  .card .data { color:#3182f6; font-weight:600; margin-top:4px; }
  .card-actions { display:flex; gap:8px; align-self:stretch; }
  .card-actions button { flex:1; padding:14px; border-radius:12px; font-size:14px; font-weight:600; }
  .ca-pri { background:#3182f6; color:#fff; } .ca-pri:hover { background:#1b64da; }
  .ca-pri:disabled { background:#d1d6db; cursor:default; }
  .ca-sec { background:#f2f4f6; color:#333d4b; } .ca-sec:hover { background:#e5e8eb; }
  .input-row { padding:14px 20px; background:transparent; display:flex; gap:8px; flex-shrink:0; align-items:flex-end; }
  .input-row textarea { flex:1; border:1.5px solid #e5e8eb; border-radius:12px; padding:12px 16px; font-size:14.5px; font-family:inherit; outline:none; resize:none; max-height:140px; overflow-y:auto; line-height:1.5; }
  .input-row textarea:focus { border-color:#3182f6; }
  .input-row textarea:disabled { background:#f2f4f6; }
  .input-row button { background:#3182f6; color:#fff; font-weight:600; font-size:14px; padding:0 20px; height:46px; border-radius:12px; flex-shrink:0; }
  .panel { flex:1; display:flex; flex-direction:column; background:#eef1f4; }

  .chip.filled:hover { border-color:#3182f6; }
  .chip.active { background:#3182f6; color:#fff; }
  .page-wrap { flex:1; overflow-y:auto; padding:10px 28px 40px; scroll-behavior:smooth; }
  .page { position:relative; background:#fff; border-radius:14px; aspect-ratio:16/9; padding:22px 26px; display:flex; gap:20px; margin-bottom:26px; box-shadow:0 3px 14px rgba(0,0,0,.07); border:1.5px solid transparent; scroll-margin-top:10px; }
  .page.active { border-color:#3182f6; }
  .draft-badge { position:absolute; top:12px; right:14px; font-size:10px; font-weight:700; letter-spacing:.5px; color:#e8740c; background:#fff3e0; padding:3px 8px; border-radius:6px; display:none; }
  .page-left { flex:1.2; display:flex; flex-direction:column; min-width:0; }
  .sec-head { font-size:12px; font-weight:600; color:#3182f6; margin-bottom:7px; }
  .sec-title { font-size:16.5px; font-weight:700; letter-spacing:-0.3px; line-height:1.35; margin-bottom:9px; color:#191f28; }
  .sec-title.empty { color:#c4cad1; font-weight:600; font-size:14px; }
  .sec-body { font-size:12.5px; line-height:1.7; color:#333d4b; overflow-y:auto; }
  .sec-body.empty { color:#b0b8c1; font-size:12px; }
  .page-right { flex:1; border:2px dashed #d1d6db; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:16px; gap:6px; }
  .page-right b { font-size:12px; color:#8b95a1; }
  .page-right span { font-size:11px; color:#b0b8c1; line-height:1.6; }
  .done-card .big { font-size:46px; margin-bottom:14px; }
  #nextCards { margin-bottom:22px; }
  .nc-label { font-size:12.5px; color:#8b95a1; font-weight:600; margin-bottom:8px; text-align:left; }
  .nc { display:block; width:100%; background:#fff; border:1.5px solid #e5e8eb; border-radius:12px; padding:12px 14px; font-size:14px; font-weight:600; color:#191f28; text-align:left; margin-bottom:8px; transition:.15s; }
  .nc:hover { border-color:#3182f6; color:#3182f6; }
  .nc small { display:block; font-weight:400; color:#8b95a1; font-size:12px; margin-top:2px; }
  #debug { position:fixed; bottom:14px; left:14px; z-index:99; }
  #debug > button { background:#191f28; color:#fff; font-size:11px; padding:7px 11px; border-radius:8px; opacity:.5; }
  #debug > button:hover { opacity:1; }
  #debugMenu { display:none; position:absolute; bottom:36px; left:0; background:#191f28; border-radius:12px; padding:8px; width:160px; }
  #debugMenu button { display:block; width:100%; text-align:left; background:none; color:#fff; font-size:12.5px; padding:8px 10px; border-radius:8px; }
  #debugMenu button:hover { background:#333d4b; }
</style>

<div id="header">
  <span class="logo">Portly</span>
  <span class="phase-label" id="phaseLabel">· 가볍게 포폴 기획하기</span>
  <span class="proj-chip" id="projChip"></span>
</div>

<div class="screen center-wrap on" id="intro">
  <div class="center-card" id="introStep1">
    <h1>Portly</h1>
    <p class="sub">Portly와 대화하면서, 흩어져 있던 작업을 포트폴리오로 정리해요.</p>
    <div class="value-box">
      <div class="step"><span class="num">1</span><span>지금까지 해온 작업을 <b>편하게 다 털어놓아 주세요.</b> 포트폴리오가 되도록 같이 정리해드릴게요.</span></div>
      <div class="step"><span class="num">2</span><span>그중 <b>면접에서 통할 임팩트 있는 프로젝트</b>를 골라드려요.</span></div>
      <div class="step"><span class="num">3</span><span>고른 프로젝트를 <b>장표로 페이지네이션</b>해드려요. Figma로 옮겨 완성하면 끝이에요.</span></div>
    </div>
    <div class="btn-row">
      <button class="btn-big btn-pri" onclick="introNext()">시작하기</button>
    </div>
  </div>
  <div class="center-card" id="introStep2" style="display:none;">
    <p class="q">포폴용 프로젝트가 확정되어 있나요?</p>
    <div class="btn-row">
      <button class="btn-big btn-sec" onclick="startDirect()">네, 정했어요</button>
      <button class="btn-big btn-sec" onclick="startConsult()">아니요, 같이 골라주세요</button>
    </div>
  </div>
</div>

<div class="screen" id="consult">
  <div class="chat-col">
    <div class="msgs" id="consultMsgs"></div>
    <div class="input-row">
      <textarea id="consultInput" rows="1" placeholder="답변을 입력하세요  (Shift+Enter 줄바꿈)" oninput="autoGrow(this)" onkeydown="onChatKey(event, sendConsult)"></textarea>
      <button onclick="sendConsult()">보내기</button>
    </div>
  </div>
</div>

<div class="screen" id="build">
  <div class="build-main">
  <div class="chat-col">
    <div class="msgs" id="buildMsgs"></div>
    <div class="input-row">
      <textarea id="buildInput" rows="1" placeholder="답변을 입력하세요  (Shift+Enter 줄바꿈)" oninput="autoGrow(this)" onkeydown="onChatKey(event, sendBuild)"></textarea>
      <button onclick="sendBuild()">보내기</button>
    </div>
  </div>
  <div class="panel">
    <div class="chips" id="chips"></div>
    <div class="page-wrap" id="pageWrap"></div>
  </div>
  </div>
  <div class="build-footer"><button id="ctaDone" onclick="tryFinish()">프로젝트 완료</button></div>
</div>

<div class="screen center-wrap" id="done">
  <div class="center-card done-card">
    <div class="big">🎉</div>
    <h1 style="font-size:26px;">프로젝트 1건 기획 완료!</h1>
    <p class="sub" id="doneSub"></p>
    <div id="nextCards"></div>
    <div class="btn-row" style="margin-bottom:22px;">
      <button class="btn-big btn-pri" onclick="downloadHTML()">HTML 다운로드</button>
      <button class="btn-big btn-sec" onclick="resetAll()">처음부터 다시 시작</button>
    </div>
    <p class="hint">Figma로 옮기려면 <b>Builder.io 플러그인(무료)</b>으로<br>다운로드한 HTML을 import 하세요.</p>
  </div>
</div>

<div id="debug">
  <button onclick="document.getElementById('debugMenu').style.display = document.getElementById('debugMenu').style.display==='block'?'none':'block'">DEV</button>
  <div id="debugMenu">
    <button onclick="resetAll()">⟲ 처음부터</button>
    <button onclick="debugJump('done')">→ 완료 화면(샘플)</button>
  </div>
</div>

<!-- ====== 시스템 프롬프트 v3 (text/plain: 이스케이프 불필요) ====== -->
<script type="text/plain" id="sysPrompt">
너는 "Portly", 포폴이 막막한 프로덕트 디자이너 옆에 앉은 실력 있는 시니어 디자인 컨설턴트예요. 상대가 해온 작업을 같이 파고들어 면접에서 통할 포폴 케이스를 찾아줘요. 결과물은 완성 포폴이 아니라 구조가 잡힌 초안이고, 사용자가 Figma로 옮겨 완성해요.

핵심 태도. 정해진 스크립트를 따르지 마요. 좋은 컨설턴트처럼, 상대가 방금 한 말에 진짜로 반응해요. 매 턴 요약부터 되짚지 마요 — 되짚기가 실제로 도움이 될 때만. 뻔한 위로("많은 분들이 그래요")로 턴을 열지 마요. 정형화된 리듬보다, 그 사람 이야기에서 가장 흥미로운 실밥을 잡아 당기는 걸 우선해요.

서두르지 않기. 재료가 얕은 채로 구조를 뽑지 마요. 구조를 빨리 만드는 건 이 도구의 가치가 아니에요 — 남이 못 본 각을 찾아주는 게 가치예요. 상대가 작업을 한꺼번에 쏟아냈더라도, 바로 "1막·2막·3막"으로 정리하려 들지 말고, 그 사람만의 구체적인 장면·판단·갈등이 나올 때까지 더 당겨봐요. 정말 충분해졌다고 스스로 판단될 때 그때 구조를 보여줘요.

구조를 보여줄 때. 정답 하나를 밀어붙이지 마요. 같은 재료로 가능한 프레이밍이 보통 여럿이에요. 재료를 보고 갈래를 발굴해서 각각의 강점을 짚어주고("이렇게 보면 이런 회사·상황에 강해요"), 네 관점은 주되("저는 개인적으로 A가 끌려요") 최종 선택은 상대가 하게 해요. 지원하려는 회사는 묻지 마요 — 기업별 맞춤은 범위 밖이고, 어느 프레이밍이 본인 강점을 더 잘 보여주는지에만 집중해요.

절대 원칙 세 가지. 첫째, 상대가 말하지 않은 수치·성과는 절대 지어내지 마요. 데이터가 없으면 "이런 지표를 측정했다면 여기 넣으면 강해져요"처럼 틀만 제안하고, 실제 숫자는 상대가 채우게 해요. 둘째, "약하다 / 케이스 안 된다"는 결론 금지. 성과의 정의를 넓혀요 — 의사결정·사용자 반응·학습도 성과예요. 정량이 없으면 "의사결정형" 케이스로 축을 바꿔요. 약점처럼 보이는 건 강점으로 뒤집어요("1개사 정착은 오히려 PMF 신호예요"). 셋째, how보다 why. 케이스는 결국 "왜 이걸 문제로 봤나 / 어떻게 풀었나 / 왜 이 설계인가"에 답하게 해요.

말투와 형식. 따뜻한 해요체로만(합니다체 금지, 상대가 반말이어도 나는 해요체). 강조는 **볼드**로. 불릿·번호·화살표 금지, 문장으로 풀어요. 이 형식 규칙은 채팅 본문에만 적용하고 아래 JSON 블록엔 적용하지 마요.

모드. 시스템 지시 끝에 앱이 [MODE: ...] [FROM: ...]를 붙여줘요.

■ CONSULT — 위 태도대로 파고들어 프레이밍을 함께 정해요. 사용자가 "[시작]"을 보내면 이 말을 그대로 건네요: "안녕하세요, Portly예요. 저랑 같이, 포트폴리오에서 가장 임팩트 있을 프로젝트를 선별해요. 먼저 가장 깊게 파고들었던 프로덕트 하나를 골라서, 거기서 직접 만든 걸 처음부터 시간 순서대로 쭉 들려주세요. 사소한 것도 괜찮아요." 상대가 방향에 마음을 정했을 때만 후보를 카드로 내요(성급하게 먼저 던지지 마요). 카드를 낼 때 "빌드로 넘어가요" 같은 내부 용어는 금지, 대신 "그럼 아래처럼 포트폴리오로 만들 프로젝트를 정리해봤어요. 하나 골라주면, 이어서 그 프로젝트를 함께 완성해나갈게요."처럼 자연스럽게 안내해요. 채팅 다음 줄에 이 블록을 정확히:
```portly-cards
[
  {"title":"프로젝트명","reason":"왜 포폴로 강한지 한 문장","data":"활용 데이터 또는 대체안"}
]
```

■ BUILD — 뼈대는 CONSULT에서 얻었으니 여기선 그걸로 wow한 초안을 만들어요. 선택된 프로젝트를 7섹션으로 인터뷰하며 포폴 언어로 정리해요. 섹션(sectionId): 0 표지, 1 배경·맥락, 2 문제, 3 가설, 4 해결책·의사결정, 5 결과·검증, 6 회고·적용. 한 번에 한 섹션, 질문 하나씩 짧게. 여기가 CONSULT에서 가볍게 넘어간 데이터·성과를 더 깊이 구체화하는 자리예요. 섹션 경계를 지켜요 — 표지(0)엔 타이틀·한 줄 정의·역할·기간·팀 구성만, 서사를 통째로 쏟지 마요. [FROM: consult]면 선별 맥락으로 표지·배경 초안을 먼저 잡고 "이거 맞아요?"로 확인, [FROM: direct]면 어떤 프로젝트인지 한 줄로 물어요. 결과(5)에선 위 수치 원칙대로 — 가짜 수치 단정 말고 넣으면 좋은 지표 예시를 제안해요. 채팅 다음 줄에 이 블록을 정확히:
```portly-section
{"sectionId": 0, "draft": true, "title": "한 줄 요약 타이틀", "body": "포폴 언어 본문", "imageHint": "이미지 가이드 한 줄"}
```

구조화 블록만 JSON 문법을 정확히. 한 응답에 블록은 최대 하나, 블록 내용을 채팅에 중복 서술 금지.
</script>

<script>
/* ====== 설정 ====== */
var WORKER_URL = "/api/chat";
var SYSTEM_PROMPT = document.getElementById('sysPrompt').textContent.trim();

var SECTIONS = [
  { name:"① 표지", guide:"프로젝트 타이틀 · 한 줄 정의 · 내 역할 · 기간 · 팀 구성 · 디자인 철학 한 문장이 들어가요.", img:"프로젝트를 상징하는 키 비주얼 1장 (대표 화면 목업)" },
  { name:"② 배경·맥락", guide:"어떤 제품/팀에서, 왜 이 프로젝트가 시작됐는지 비즈니스·사용자 맥락을 담아요.", img:"제품/서비스 소개 또는 AS-IS 화면" },
  { name:"③ 문제", guide:"발견한 문제와, 그걸 '어떻게 발굴했는지'(사용자 인터뷰·데이터·VOC)를 담아요.", img:"리서치 장면, 사용자 여정에서 문제 지점 하이라이트" },
  { name:"④ 가설", guide:"\"이렇게 하면 이럴 것이다\" — 리서치에 근거한, 검증 가능한 가설을 담아요.", img:"가설 구조 다이어그램 (문제→가설→기대효과)" },
  { name:"⑤ 해결책·의사결정", guide:"후보안(A안 vs B안), 선택 근거, 포기한 것(트레이드오프)을 담아요.", img:"A안 vs B안 와이어프레임 비교, 최종 디자인 핵심 화면" },
  { name:"⑥ 결과·검증", guide:"정량 지표 또는 정성 신호로 가설을 어떻게 검증했는지 담아요.", img:"before/after 비교 또는 지표 그래프" },
  { name:"⑦ 회고·적용", guide:"가장 크게 배운 점과 다음에 적용할 것을 담아요.", img:"러닝 키워드 3개를 시각화한 카드" }
];

/* ====== 상태 ====== */
var st;
function freshState(){ return { mode:"-", from:"-", hist:[], project:null, sections:[null,null,null,null,null,null,null], active:0, busy:false, cards:[], selectedCard:-1, candidates:[] }; }
st = freshState();

/* ====== 헬퍼 ====== */
function $(id){ return document.getElementById(id); }
function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':String(s)); return d.innerHTML; }
function escBody(s){ return esc(s).replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
function show(screen){
  ['intro','consult','build','done'].forEach(function(s){ $(s).classList.remove('on'); });
  $(screen).classList.add('on');
  $('projChip').style.display = (screen==='build' && st.project) ? 'inline-block' : 'none';
  if(st.project) $('projChip').textContent = st.project;
  $('phaseLabel').textContent = screen==='consult' ? '· 프로젝트 선별' : screen==='build' ? '· 프로젝트 기획' : '· 가볍게 포폴 기획하기';
}
function addMsg(listId, cls, html){
  var m=document.createElement('div'); m.className='bubble '+cls; m.innerHTML=html;
  $(listId).appendChild(m); $(listId).scrollTop=$(listId).scrollHeight; return m;
}
function sysNote(listId, text){
  var n=document.createElement('div'); n.className='sysnote'; n.textContent=text;
  $(listId).appendChild(n); $(listId).scrollTop=$(listId).scrollHeight;
}
function showTyping(listId){ var m=addMsg(listId,'ai typing','···'); return m; }
function setBusy(b){ st.busy=b; ['consultInput','buildInput'].forEach(function(id){ var e=$(id); if(e) e.disabled=b; }); }

/* ====== 입력창: 자동 높이 + Shift+Enter 줄바꿈 ====== */
function autoGrow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
function onChatKey(e, sendFn){
  if(e.key==='Enter' && !e.shiftKey && !e.isComposing && e.keyCode!==229){
    e.preventDefault();
    sendFn();
  }
}
function parseBlocks(text){
  var out={ chat:text, cards:null, section:null };
  var cm = text.match(/```portly-cards\s*([\s\S]*?)```/);
  if(cm){ try{ out.cards=JSON.parse(cm[1].trim()); }catch(e){} out.chat=out.chat.replace(cm[0],'').trim(); }
  var sm = text.match(/```portly-section\s*([\s\S]*?)```/);
  if(sm){ try{ out.section=JSON.parse(sm[1].trim()); }catch(e){} out.chat=out.chat.replace(sm[0],'').trim(); }
  return out;
}
function visiblePart(text){ return text.split("```")[0]; }
async function runTurn(listId, userText, showBubble){
  if(st.busy) return;
  var meB = null;
  if(showBubble) meB = addMsg(listId,'me',esc(userText));
  st.hist.push({ role:"user", text:userText });
  setBusy(true);
  var typing = showTyping(listId);
  function pin(){ if(meB && meB.scrollIntoView){ try{ meB.scrollIntoView({block:'start'}); }catch(e){} } else { $(listId).scrollTop=$(listId).scrollHeight; } }
  pin();
  try{
    var res = await fetch(WORKER_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ system: SYSTEM_PROMPT, mode: st.mode, from: st.from, messages: st.hist })
    });
    if(!res.ok){
      var ed = await res.json().catch(function(){ return {}; });
      var detail = ed.raw ? (" / 상세: " + JSON.stringify(ed.raw).slice(0,400)) : "";
      throw new Error((ed.error || ("HTTP "+res.status)) + detail);
    }
    if(typing.parentNode) typing.parentNode.removeChild(typing);
    var bubble = addMsg(listId,'ai','');
    pin();
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var full = "";
    while(true){
      var c = await reader.read();
      if(c.done) break;
      full += decoder.decode(c.value, { stream:true });
      bubble.innerHTML = escBody(visiblePart(full));
    }
    st.hist.push({ role:"model", text: full });
    var p = parseBlocks(full);
    if(p.chat){ bubble.innerHTML = escBody(p.chat); }
    else if(bubble.parentNode){ bubble.parentNode.removeChild(bubble); }
    if(p.cards && p.cards.length) renderCards(p.cards);
    if(p.section) applySection(p.section);
    pin();
  }catch(e){
    if(typing.parentNode) typing.parentNode.removeChild(typing);
    sysNote(listId, "⚠️ AI 응답 오류: " + e.message + " — 잠시 후 다시 시도해주세요.");
  }
  setBusy(false);
}

/* ====== INTRO ====== */
function introNext(){ $('introStep1').style.display='none'; $('introStep2').style.display='block'; }
function startConsult(){
  st.mode="CONSULT"; st.from="-"; st.hist=[];
  show('consult');
  runTurn('consultMsgs','[시작]', false);
}
function startDirect(){
  st.mode="BUILD"; st.from="direct"; st.hist=[];
  show('build'); initPanel();
  runTurn('buildMsgs','[시작]', false);
}

/* ====== CONSULT ====== */
function sendConsult(){
  var inp=$('consultInput'); var v=inp.value.trim(); if(!v||st.busy) return;
  inp.value=''; inp.style.height='auto';
  runTurn('consultMsgs', v, true);
}
function staleCards(){
  var list=$('consultMsgs').querySelectorAll('.cards, .card-actions');
  for(var i=0;i<list.length;i++) list[i].classList.add('stale');
}
function renderCards(cards){
  staleCards();
  st.cards = cards; st.selectedCard=-1;
  var wrap=document.createElement('div'); wrap.className='cards';
  cards.forEach(function(c,idx){
    var b=document.createElement('button'); b.className='card';
    b.innerHTML='<b>'+esc(c.title)+'</b><span>'+esc(c.reason)+'</span><span class="data">'+esc(c.data)+'</span>';
    b.onclick=function(){
      st.selectedCard = (st.selectedCard===idx) ? -1 : idx;
      wrap.querySelectorAll('.card').forEach(function(el,k){ el.classList.toggle('selected', k===st.selectedCard); });
      pri.disabled = (st.selectedCard<0);
    };
    wrap.appendChild(b);
  });
  $('consultMsgs').appendChild(wrap);

  var actions=document.createElement('div'); actions.className='card-actions';
  var pri=document.createElement('button'); pri.className='ca-pri'; pri.textContent='프로젝트 선별 완료'; pri.disabled=true;
  pri.onclick=function(){
    if(st.selectedCard<0) return;
    selectProject(st.cards[st.selectedCard]);
  };
  var sec=document.createElement('button'); sec.className='ca-sec'; sec.textContent='조금 더 고민할게요';
  sec.onclick=function(){ runTurn('consultMsgs','조금 더 고민해볼게요. 다른 작업도 더 이야기할게요.', true); };
  actions.appendChild(pri); actions.appendChild(sec);
  $('consultMsgs').appendChild(actions);
  $('consultMsgs').scrollTop=$('consultMsgs').scrollHeight;
}
function selectProject(c){
  st.project=c.title;
  st.candidates = st.cards.filter(function(x){ return x!==c; });
  st.mode="BUILD"; st.from="consult";
  show('build'); initPanel();
  runTurn('buildMsgs','[선택한 프로젝트: '+c.title+'] 이 프로젝트로 포폴 기획을 시작할게요.', false);
}

/* ====== BUILD ====== */
function sendBuild(){
  var inp=$('buildInput'); var v=inp.value.trim(); if(!v||st.busy) return;
  inp.value=''; inp.style.height='auto';
  focusSection(st.active);
  runTurn('buildMsgs', v, true);
}
function applySection(o){
  var id = o.sectionId;
  if(typeof id!=='number' || id<0 || id>6) return;
  st.sections[id] = { lead: esc(o.title), body: escBody(o.body), draft: !!o.draft };
  updateCard(id); renderChips();
  var pg=$('sec'+id);
  if(pg && o.imageHint) pg.querySelector('.page-right span').textContent = o.imageHint;
  if(id===0 && o.title){ st.project=o.title; $('projChip').textContent=o.title; $('projChip').style.display='inline-block'; }
  setActive(id);
}

/* ====== 패널 ====== */
function initPanel(){
  var w=$('pageWrap'); w.innerHTML='';
  SECTIONS.forEach(function(s,i){
    var pg=document.createElement('div'); pg.className='page'; pg.id='sec'+i;
    pg.innerHTML='<div class="draft-badge">DRAFT</div>'+
      '<div class="page-left"><div class="sec-head">'+s.name+'</div><div class="title-slot"></div><div class="body-slot"></div></div>'+
      '<div class="page-right"><b>이미지 영역</b><span>'+s.img+'</span></div>';
    w.appendChild(pg);
  });
  renderChips();
  for(var i=0;i<7;i++) updateCard(i);
}
function updateCard(i){
  var pg=$('sec'+i); if(!pg) return;
  var s=SECTIONS[i], d=st.sections[i];
  var t=pg.querySelector('.title-slot'), b=pg.querySelector('.body-slot');
  pg.querySelector('.draft-badge').style.display = (d && d.draft) ? 'block' : 'none';
  if(d){ t.innerHTML='<div class="sec-title">'+d.lead+'</div>'; b.innerHTML='<div class="sec-body">'+d.body+'</div>'; }
  else { t.innerHTML='<div class="sec-title empty">대화로 채워질 요약 타이틀</div>'; b.innerHTML='<div class="sec-body empty">'+s.guide+'</div>'; }
  pg.classList.toggle('active', i===st.active);
}
function setActive(i){
  st.active=i;
  for(var k=0;k<7;k++){ var pg=$('sec'+k); if(pg) pg.classList.toggle('active', k===i); }
  renderChips(); focusSection(i);
}
function focusSection(i){ var pg=$('sec'+i); if(pg && pg.scrollIntoView){ try{ pg.scrollIntoView({behavior:'smooth',block:'start'}); }catch(e){} } }
function renderChips(){
  var w=$('chips'); w.innerHTML='';
  SECTIONS.forEach(function(s,i){
    var c=document.createElement('button');
    c.className='chip'+(st.sections[i]?' filled':'')+(i===st.active?' active':'');
    c.textContent=s.name; c.onclick=function(){ focusSection(i); };
    w.appendChild(c);
  });
}

/* ====== 완료/다운로드 ====== */
function tryFinish(){
  var empty=SECTIONS.filter(function(s,i){ return !st.sections[i]; }).map(function(s){ return s.name; });
  if(empty.length>0){ if(!confirm('아직 비어있는 섹션이 있어요: '+empty.join(', ')+'\n그래도 완료할까요?')) return; }
  $('doneSub').textContent=(st.project||'프로젝트')+'의 기획이 정리됐어요. HTML을 Figma로 옮겨 포트폴리오를 완성하세요.';
  renderNextCards(); show('done');
}
function renderNextCards(){
  var w=$('nextCards'); w.innerHTML='';
  if(st.from!=='consult' || st.candidates.length===0) return;
  var label=document.createElement('div'); label.className='nc-label'; label.textContent='선별해둔 남은 후보로 이어서 기획하기';
  w.appendChild(label);
  st.candidates.forEach(function(c){
    var b=document.createElement('button'); b.className='nc';
    b.innerHTML=esc(c.title)+'<small>'+esc(c.data)+'</small>';
    b.onclick=function(){ continueWith(c); };
    w.appendChild(b);
  });
}
function continueWith(c){
  st.candidates = st.candidates.filter(function(x){ return x!==c; });
  $('buildMsgs').innerHTML='';
  st.sections=[null,null,null,null,null,null,null]; st.active=0; st.project=c.title;
  st.mode="BUILD"; st.from="consult";
  show('build'); initPanel();
  runTurn('buildMsgs','[다른 후보로 변경: '+c.title+'] 이 프로젝트로 새로 기획을 시작할게요. 표지부터 다시 잡아주세요.', false);
}
function downloadHTML(){
  var pages=SECTIONS.map(function(s,i){
    var d=st.sections[i];
    var title=d ? d.lead : '(미작성)';
    var body=d ? d.body : '<span style="color:#bbb;">'+s.guide+'</span>';
    return '<div class="pgw"><div class="pg">'
      +'<div style="flex:2;min-width:0;">'
        +'<div style="font-size:16pt;font-weight:600;color:#3182f6;margin-bottom:14px;">'+s.name+'</div>'
        +'<div style="font-size:24pt;font-weight:700;color:#191f28;line-height:1.35;margin-bottom:24px;">'+title+'</div>'
        +'<div style="font-size:14pt;line-height:1.8;color:#333d4b;">'+body+'</div>'
      +'</div>'
      +'<div style="flex:3;border:3px dashed #ccc;border-radius:24px;display:flex;align-items:center;justify-content:center;text-align:center;color:#999;font-size:13pt;padding:40px;">[이미지 영역]<br><br>'+s.img+'</div>'
    +'</div></div>';
  }).join('');
  var fitJs='function fit(){var s=Math.min(1,(window.innerWidth-48)/1920);'
    +'document.querySelectorAll(".pg").forEach(function(p){p.style.transform="scale("+s+")";'
    +'var w=p.parentElement;w.style.width=(1920*s)+"px";w.style.height=(1080*s)+"px";});}'
    +'window.addEventListener("resize",fit);fit();';
  var html='<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width, initial-scale=1.0">'
    +'<title>'+(st.project||'Portly 포폴')+'</title><style>'
    +'body{margin:0;background:#e9ecef;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;}'
    +'.pgw{margin:48px auto;overflow:hidden;}'
    +'.pg{width:1920px;height:1080px;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.10);border-radius:8px;display:flex;gap:60px;padding:100px;box-sizing:border-box;transform-origin:top left;}'
    +'</style></head><body>'+pages+'<scr'+'ipt>'+fitJs+'</scr'+'ipt></body></html>';
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a.download='Portly_'+(st.project||'포폴케이스')+'.html'; a.click();
}

/* ====== 리셋/디버그 ====== */
function resetAll(){
  st=freshState();
  $('consultMsgs').innerHTML=''; $('buildMsgs').innerHTML=''; $('pageWrap').innerHTML='';
  $('introStep1').style.display='block'; $('introStep2').style.display='none';
  show('intro'); $('debugMenu').style.display='none';
}
function debugJump(t){
  $('debugMenu').style.display='none';
  if(t==='done'){
    st.project=st.project||'샘플 프로젝트';
    for(var i=0;i<7;i++) st.sections[i]={lead:SECTIONS[i].name+' 샘플 타이틀', body:'샘플 본문', draft:false};
    $('doneSub').textContent='샘플 — 완료 화면 미리보기'; renderNextCards(); show('done');
  }
}
</script>
</body>
</html>
